<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - Task 2: Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Form Validation</h1>
        <form id="val-form" onsubmit="return validateForm(event)">
            <div class="form-group">
                <label for="name">Name (max 10 characters):</label>
                <input type="text" id="name" autocomplete="off">
                <div id="name-error" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="age">Age (from 1 to 100):</label>
                <input type="text" id="age" autocomplete="off">
                <div id="age-error" class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="text" id="email" autocomplete="off">
                <div id="email-error" class="error-msg"></div>
            </div>

            <button type="submit">Submit</button>
            <div id="success-msg" class="success-msg"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
