<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - Time Travel Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Task 3: Time Travel</h1>
        <p>Click on any of the buttons below to alert the date and time corresponding to the time period.</p>
        <div class="button-grid">
            <button type="button" id="btn-now" class="btn-now">Now</button>
            <button type="button" id="btn-yesterday" class="btn-yesterday">Yesterday</button>
            <button type="button" id="btn-tenyears" class="btn-tenyears">Ten Years Ago</button>
            <button type="button" id="btn-oneweek" class="btn-oneweek">In One Week</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
