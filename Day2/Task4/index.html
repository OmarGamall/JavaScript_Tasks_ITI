<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 - String Comparison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Task 4: Compare Strings</h1>
        <p>Enter two strings to compare them alphabetically using operators.</p>
        
        <form id="compare-form" onsubmit="return false;">
            <div class="form-group">
                <label for="str1">Enter first string:</label>
                <input type="text" id="str1">
            </div>

            <div class="form-group">
                <label for="str2">Enter second string:</label>
                <input type="text" id="str2">
            </div>

            <button id="btn-compare">Compare</button>

            <div class="form-group">
                <label for="result">Comparison Output:</label>
                <textarea id="result" readonly placeholder="Result will be shown here..."></textarea>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
