<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

    <div class="container">
        <h1>Task 2: Splice Array</h1>
        <p>Delete "Apple" and insert "Lemon", "Kiwi" using the array splice method.</p>

        <div class="array-display">

        </div>

        <button id="btn-modify">Modify Array</button>

        <div id="result-label" class="state-label" style="display: none;">Modified Output</div>
        <div id="result" class="result-box"></div>
    </div>
